<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sanat Pednekar</title>
    <script>
      // GitHub Pages SPA redirect trick (custom domain at root, segmentCount = 0)
      // Encodes the path into the query string as ?/path so index.html can restore it
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?/' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
