<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sanat Pednekar</title>
    <script>
      // GitHub Pages SPA redirect — for custom domain at root,
      // just redirect to / preserving the path as a query param
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
